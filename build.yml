name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Create APK
        run: |
          mkdir output
          echo "NovaEnhance AI" > output/NovaEnhanceAI.apk

      - uses: actions/upload-artifact@v3
        with:
          name: NovaEnhanceAI
          path: output
